    <p style="font-size:12px;color:var(--text-3);margin-top:8px">Or type a subject below.</p>
  `);
}

function enrollPickSubject(subject) {
  // Clean the subject — remove extra words like "related", "courses", "classes"
  const cleanSubject = subject
    .replace(/(related|courses|classes|course|class|subjects|subject)/gi, '')
    .replace(/\s+/g, ' ').trim() || subject;
  enrollmentData.subject = cleanSubject;
  enrollmentStep = 'term';
  addUserMsg(subject); // show original to user

  const terms = ['Summer 2026', 'Fall 2026', 'Spring 2027', 'Not sure yet'];
  const termBtns = terms.map(term =>
    `<button class="choice-btn" onclick="enrollPickTerm('${esc(term)}')">${escHtml(term)}</button>`
  ).join('');

  addBotMsg(`
    <p><strong>What term are you planning to start?</strong></p>
    <div class="choice-wrap">${termBtns}</div>
  `);
}

async function enrollPickTerm(term) {
  enrollmentData.term = term;
  enrollmentStep = null; // done with guided flow
  addUserMsg(term);

  const { college, subject } = enrollmentData;
  const collegeId = getCollegeID(college);
  const collegeDisplay = getCollegeDisplay(collegeId);

  // Search courses based on what they told us.
  // Keep this course-first because the user asked for courses.
  const searchQuery = subject === 'Other' ? collegeId : `${subject} ${collegeId === 'Any' ? '' : collegeId}`;
  let cRows = subject !== 'Other' ? uniqueCourseRows(searchCourses(searchQuery)) : [];

  // If enrollment flow subject search found nothing, try AI interpretation
  if (cRows.length === 0 && subject !== 'Other') {
    const _aiRes = await searchCoursesWithAI(subject);
    if (_aiRes && _aiRes.rows && _aiRes.rows.length > 0) {
      cRows = uniqueCourseRows(_aiRes.rows);
    }
  }

  // Filter by selected college using CollegeID / alias matching
  const selectedCollegeRows = collegeId === 'Any' ? cRows :
    cRows.filter(r => normalizeText(r['CollegeID']) === normalizeText(collegeId));

  // Exact selected college + selected term match.
  const exactRows = term === 'Not sure yet'
    ? selectedCollegeRows.slice(0, 8)
    : selectedCollegeRows.filter(r => courseMatchesTerm(r, term)).slice(0, 8);

  let html = '';

  if (exactRows.length > 0) {
    html += `<p>${lang === 'es' ? 'Esto es lo que encontré para' : "Here's what I found for"} <strong>${escHtml(subject)}</strong>`;
    if (collegeId !== 'Any') html += ` ${lang === 'es' ? 'en' : 'at'} <strong>${escHtml(collegeDisplay)}</strong>`;
    if (term !== 'Not sure yet') html += ` ${lang === 'es' ? 'para' : 'for'} <strong>${escHtml(term)}</strong>`;
    html += `:</p>`;
    html += exactRows.map(row => buildCourseCard(row, row['CollegeID'], 'Prospect')).join('');
  } else {
    html += `<p>${lang === 'es' ? 'No veo una coincidencia exacta para' : "I don't see an exact match for"} <strong>${escHtml(subject)}</strong>`;
    if (collegeId !== 'Any') html += ` ${lang === 'es' ? 'en' : 'at'} <strong>${escHtml(collegeDisplay)}</strong>`;
    if (term !== 'Not sure yet') html += ` ${lang === 'es' ? 'para' : 'for'} <strong>${escHtml(term)}</strong>`;
    html += ` ${lang === 'es' ? 'en los datos actuales de ICCOC.' : 'in the current ICCOC course data.'}</p>`;

    // Smart fallback: since the user asked for courses, still show related course options.
    const used = new Set();
    const takeUnused = rows => uniqueCourseRows(rows).filter(row => {
      const key = rowKey(row);
      if (used.has(key)) return false;
      used.add(key);
      return true;
    });

    // 1) Same college, other terms
    const sameCollegeOtherTerms = term === 'Not sure yet'
      ? []
      : selectedCollegeRows.filter(r => !courseMatchesTerm(r, term));
    html += renderCourseSection(
      lang === 'es'
        ? `Cursos relacionados de ${subject} en ${collegeDisplay} en otros semestres`
        : `Related ${subject} courses at ${collegeDisplay} in other terms`,
      takeUnused(sameCollegeOtherTerms),
      5
    );

    // 2) Same term, other ICCOC colleges
    const sameTermOtherColleges = term === 'Not sure yet'
      ? []
      : cRows.filter(r => courseMatchesTerm(r, term) && (collegeId === 'Any' || normalizeText(r['CollegeID']) !== normalizeText(collegeId)));
    html += renderCourseSection(
      lang === 'es'
        ? `Cursos de ${subject} en otros colegios ICCOC para ${term}`
        : `${subject} courses at other ICCOC colleges for ${term}`,
      takeUnused(sameTermOtherColleges),
      6
    );

    // 3) Any related course options across ICCOC, regardless of term
    const broaderRelated = cRows.filter(r => collegeId === 'Any' || normalizeText(r['CollegeID']) !== normalizeText(collegeId));
    html += renderCourseSection(
      lang === 'es'
        ? `Otras opciones relacionadas de ${subject} en ICCOC`
        : `Other related ${subject} course options across ICCOC`,
      takeUnused(broaderRelated),
      6
    );

    if (!sameCollegeOtherTerms.length && !sameTermOtherColleges.length && !broaderRelated.length) {
      html += `<div class="smart-note">${lang === 'es'
        ? 'No encontré cursos relacionados en la base de datos actual. Puede revisar programas relacionados abajo o explorar la página de la universidad.'
        : 'I did not find related courses in the current data. You can review related programs below or explore the college page.'}</div>`;
    }
  }

  // Add related programs/advisors from PROGRAMS_KB after course options.
  // This helps the student/prospect without making Tracy the first stop.
  const programMatches = searchPrograms(`${subject} ${collegeId}`).filter(r =>
    collegeId === 'Any' || normalizeText(r['CollegeID']) === normalizeText(collegeId)
  ).slice(0, 3);

  if (programMatches.length) {
    html += `<div class="smart-note"><strong>${lang === 'es' ? 'Programas relacionados y contactos' : 'Related programs and contacts'}</strong><br>${lang === 'es'
      ? 'Si está explorando un programa o una carrera en esta área, estos contactos pueden ayudarle con requisitos, plan de estudios y próximos pasos:'
      : 'If you are exploring a program or career pathway in this area, these contacts can help with requirements, degree planning, and next steps:'}</div>`;
    programMatches.forEach(r => { html += renderAdvisorCard(r); });
  }

  const portal = getCollegePortalHtml(collegeId);
  if (portal) html += portal;

  html += `<div class="smart-note">${lang === 'es'
    ? `Si todavía necesita ayuda general de ICCOC después de revisar estas opciones, contacte a ${generalContactHtml()}.`
    : `If you still need general ICCOC help after reviewing these options, contact ${generalContactHtml()}.`}</div>`;

  addBotMsg(html);
  enrollmentData = { college: null, subject: null, term: null };
  showChips('course_results');
}

/* Get unique subject areas from COURSES_KB for a specific college */
function getUniqueSubjectsFromKB(college) {
  if (!kbData || !kbData.courses) return ['Accounting','Biology','Business','Computer Science','English','Math','Nursing','Psychology'];

  const subjectSet = new Set();
  const prefixToSubject = {
    'ACC': 'Accounting', 'ADM': 'Office Administration', 'AGA': 'Agriculture',
    'AGB': 'Agriculture Business', 'AGC': 'Agriculture', 'AGH': 'Horticulture',
    'AGN': 'Agriculture', 'AGP': 'Agriculture', 'AGS': 'Agriculture',
    'ADN': 'Nursing', 'ART': 'Art', 'BCA': 'Computer Applications',
    'BIO': 'Biology', 'BUS': 'Business', 'CHM': 'Chemistry',
    'CIS': 'Computer Science', 'COM': 'Communications', 'CRJ': 'Criminal Justice',
    'DEN': 'Dental', 'ECN': 'Economics', 'EDU': 'Education',
    'ENG': 'English', 'ENV': 'Environmental Science', 'FIN': 'Finance',
    'GEO': 'Geography', 'HIS': 'History', 'HSC': 'Health Science',
    'HSV': 'Human Services', 'HUM': 'Humanities', 'LGL': 'Legal Studies',
    'LIT': 'Literature', 'MAT': 'Mathematics', 'MGT': 'Management',
    'MKT': 'Marketing', 'MUS': 'Music', 'NET': 'Networking',
    'PEC': 'Physical Education', 'PHI': 'Philosophy', 'PHR': 'Pharmacy',
    'PHY': 'Physics', 'POL': 'Political Science', 'PSY': 'Psychology',
    'REL': 'Religion', 'SDV': 'Student Development', 'SOC': 'Sociology',
    'SPC': 'Speech', 'WLD': 'Welding',
  };

  const collegeId = getCollegeID(college);
  kbData.courses.forEach(row => {
    // Filter by college if specific
    if (collegeId !== 'Any' && normalizeText(row['CollegeID']) !== normalizeText(collegeId)) return;

    const code = String(row['CourseCode'] || '').split('-')[0].replace(/[^A-Za-z]/g,'').toUpperCase();
    const subject = prefixToSubject[code];
    if (subject) subjectSet.add(subject);
  });

  const result = [...subjectSet].sort();
  return result.length > 0 ? result : ['Accounting','Biology','Business','English','Math','Nursing'];
}

function handleEnrollmentStep(text) {
  // User typed instead of clicking a button
  const x = text.toLowerCase();
  if (enrollmentStep === 'college') {
    enrollPickCollege(text);
  } else if (enrollmentStep === 'subject') {
    enrollPickSubject(text);
  } else if (enrollmentStep === 'term') {
    // Map typed text to a term
    let term = text;
    if (/summer/i.test(text)) term = 'Summer 2026';
    else if (/fall/i.test(text)) term = 'Fall 2026';
    else if (/spring/i.test(text)) term = 'Spring 2027';
    else if (/not sure|unsure|any/i.test(text)) term = 'Not sure yet';
    enrollPickTerm(term);
  }
}

/* ================================================================
   AI-ASSISTED INTENT EXTRACTION
   For ambiguous queries where our prefix/keyword map can't determine
   the subject, we ask Claude to interpret the query and return
   structured search terms we use to search the KB.
   Only fires when searchCourses() returns zero results.
   ================================================================ */

async function aiExtractSearchIntent(userQuery) {
  if (!apiKey && !AI_PROXY_URL) return null;

  // Build the list of available subjects from the KB
  const subjectList = kbData && kbData.courses
    ? [...new Set(Object.keys(SUBJECT_PREFIX_MAP).filter(k => k.length >= 3))]
        .sort().slice(0, 60).join(', ')
    : 'accounting, biology, nursing, computer science, business, art, math, history, psychology';

  const prompt = `You are helping a college course search system interpret a student's query.

Student query: "${userQuery}"

Available subject keywords in the course catalog: ${subjectList}

Your job: figure out what subject(s) the student is looking for and return the best search terms.

Rules:
- "IT", "information technology", "tech" → computer science, networking, cis
- "health" → nursing, health science
- "business admin" → business, management, accounting
- Always map to subjects actually available in the list above
- Return ONLY valid JSON, no explanation

Return this exact JSON format:
{
  "understood": "what you think the student is looking for in plain English",
  "searchTerms": ["term1", "term2", "term3"],
  "confidence": "high|medium|low"
}`;

  try {
    const payload = {
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 150,
      messages: [{ role: 'user', content: prompt }]
    };

    let data;
    if (AI_PROXY_URL) {
      const res = await fetch(AI_PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      data = await res.json();
    } else {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(payload)
      });
      data = await res.json();
    }

    const raw = Array.isArray(data.content)
      ? data.content.map(c => c.text || '').join('')
      : (data.reply || data.text || '');

    // Parse JSON response
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    return parsed;

  } catch(e) {
    console.warn('aiExtractSearchIntent failed:', e.message);
    return null;
  }
}

/* Try to search courses using AI-extracted terms */
async function searchCoursesWithAI(userQuery) {
  const intent = await aiExtractSearchIntent(userQuery);
  if (!intent || !intent.searchTerms || intent.searchTerms.length === 0) return null;

  // Try each search term and collect results
  let allRows = [];
  for (const term of intent.searchTerms) {
    const rows = searchCourses(term);
    allRows.push(...rows);
  }

  // Deduplicate
  const seen = new Set();
  const unique = allRows.filter(row => {
    const key = rowKey(row);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  return { rows: unique.slice(0, 15), intent };
}

/* ================================================================
   SEND MESSAGE
   ================================================================ */
async function sendMessage() {
  if (busy) return;
  if (onboardingStep !== 'done') { addBotMsg('<p>Please complete the setup above first.</p>'); return; }
  if (!apiKey) { addBotMsg('<p>Please enter your Anthropic API key to continue.</p>'); document.getElementById('apiBanner').style.display = 'flex'; return; }

  const inp  = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;
  const detectedLang = detectUserLanguage(text);
  if (detectedLang !== lang) setLang(detectedLang);

  inp.value = ''; inp.style.height = 'auto';
  hideChips(); busy = true;
  document.getElementById('sendBtn').disabled = true;

  // ── GUIDED ENROLLMENT FLOW ──────────────────────────────────
  // Handle typed replies here BEFORE addUserMsg(), because the flow functions
  // add the user's message themselves. This prevents duplicate bubbles like "ncc" twice.
  if (enrollmentStep !== null) {
    handleEnrollmentStep(text);
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
    return;
  }

  // ── HANDLE PROGRAM REPLY (when bot asked "what program are you in?") ──
  // BUT: if the user typed a course search instead, let it through
  if (awaitingProgram && text.length < 80 && !isCourseLookup(text)) {
    awaitingProgram = false;
    addUserMsg(text);

    // Smart fuzzy match against known programs
    const ranked = findProgramMatches(text, 6);
    const top = ranked[0];
    const conf = top ? confidenceFromScore(top.score) : 'low';
    const matches = ranked.map(x => x.row);

    if (top && conf === 'high' && (ranked.length === 1 || top.score >= (ranked[1].score + 4))) {
      selectedProgram = top.row['ProgramName'];
      localStorage.setItem('iccoc_program', selectedProgram);
      updateContextBar();
      let html = `<p>${lang === 'es' ? 'Encontré su programa' : 'Found it'} ${confidencePill(conf)} — <strong>${escHtml(selectedProgram)}</strong>. ${lang === 'es' ? 'Aquí está su asesor:' : "Here's your advisor:"}</p>`;
      html += renderAdvisorCard(top.row);
      if (!userFlags.trio && top.row['TRIO_Advisor']) {
        awaitingTrio = true;
        html += `<p style="margin-top:10px">${lang === 'es' ? '¿También es estudiante de' : 'Are you also a'} <strong>TRIO</strong>?</p>
          <div class="choice-wrap">
            <button class="choice-btn" onclick="confirmTrio(true)">${lang === 'es' ? 'Sí' : 'Yes'}</button>
            <button class="choice-btn" onclick="confirmTrio(false)">No</button>
          </div>`;
      }
      addBotMsg(html);
    } else if (matches.length > 0) {
      let html = `<p>${lang === 'es' ? 'Encontré algunos programas parecidos. ¿Cuál es el suyo?' : 'I found a few possible program matches. Which one are you in?'} ${top ? confidencePill(conf) : ''}</p><div class="choice-wrap">`;
      matches.forEach(r => {
        html += `<button class="choice-btn" onclick="selectProgramFromChat('${esc(r['ProgramName'])}')">${escHtml(r['ProgramName'])}</button>`;
      });
      html += `</div>`;
      addBotMsg(html);
      awaitingProgram = true;
    } else {
      // No exact match — show nearby program options instead of dead-ending.
      const nearbyPrograms = getCollegePrograms(selectedCollege, 10);
      let html = `<p>I did not find an exact program named <strong>${escHtml(text)}</strong>, but here are programs listed for <strong>${escHtml(selectedCollege || 'your college')}</strong>. Please pick the closest match:</p>`;
      if (nearbyPrograms.length) {
        html += `<div class="choice-wrap">`;
        nearbyPrograms.forEach(r => {
          html += `<button class="choice-btn" onclick="selectProgramFromChat('${esc(r['ProgramName'])}')">${escHtml(r['ProgramName'])}</button>`;
        });
        html += `</div>`;
      } else {
        const chipHtml = renderProgramChips();
        html += chipHtml || `<p style="font-size:12.5px;color:var(--text-3)">Try typing one or two keywords from the program name.</p>`;
      }
      addBotMsg(html);
      awaitingProgram = true; // stay in program-awaiting mode
    }

    showChips('advising');
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
    return;
  }

  addUserMsg(text);

  // ── STUDENT SUPPORT SERVICE LOOKUP ──────────────────────────
  // Questions like “international advisor,” “foreign student,” “TRIO,”
  // “financial aid,” etc. should search STUDENT_SUPPORT_SERVICES first,
  // not the Programs table and not the general AI fallback.
  if (isSupportServiceLookup(text)) {
    if (/international|foreign|f1|f-1|visa|i20|i-20|sevis|immigration|estudiante extranjero|internacional/.test(normalizeText(text))) {
      userFlags.international = true;
    }
    if (/trio|first generation|first-gen|low income/.test(normalizeText(text))) {
      userFlags.trio = true;
    }
    const resultHtml = renderSupportServiceGuidance(text);
    addBotMsg(resultHtml);
    history.push({ role: 'user', content: text });
    history.push({ role: 'assistant', content: resultHtml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() });
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
    showChips('default');
    return;
  }

  // ── PROSPECT PROGRAM / ADVISOR LOOKUP ───────────────────────
  // If a prospect asks who to contact about a program, use PROGRAMS_KB first
  // instead of dumping course cards or sending them immediately to ICCOC general contact.
  if (isProspectProgramAdvisorQuestion(text)) {
    const resultHtml = renderProspectProgramGuidance(text);
    addBotMsg(resultHtml);
    history.push({ role: 'user', content: text });
    history.push({ role: 'assistant', content: resultHtml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() });
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
    showChips('advising');
    return;
  }

  // ── PROSPECT COURSE/PROGRAM SEARCH — runs before program lookup ─
  // Must be here so "I need accounting classes" → courses, not programs
  if (role === 'Prospect' && isProspectCourseSearch(text)) {
    history.push({ role: 'user', content: text });
    const _intent = detectIntent(text);
    const _askWho = /which college|what college|do any|does any|colleges? (offer|have)|where can i (find|take|study)/.test(text.toLowerCase());
    let _cRows  = !_askWho ? searchCourses(text) : [];
    const _pRows  = searchPrograms(text);
    let _html = '';
    let _aiInterpretation = null;

    // ── If no results, ask AI to interpret the query ──────────
    if (!_askWho && _cRows.length === 0 && _pRows.length === 0) {
      showTyping();
      const _aiResult = await searchCoursesWithAI(text);
      removeTyping();
      if (_aiResult && _aiResult.rows && _aiResult.rows.length > 0) {
        _cRows = _aiResult.rows;
        _aiInterpretation = _aiResult.intent;
      }
    }

    if (!_askWho && _cRows.length > 0) {
      if (_aiInterpretation) {
        _html += `<div class="smart-note" style="margin-bottom:8px">
          I interpreted "<strong>${escHtml(text)}</strong>" as <strong>${escHtml(_aiInterpretation.understood || '')}</strong> and searched for those courses.
        </div>`;
      }
      _html += renderCourseResults(text, _cRows, role);
      if (_pRows.length > 0 && _intent === 'program_search')
        _html += `<div style="margin-top:12px"><p style="font-size:13px;font-weight:600;margin-bottom:8px">Related programs:</p>${renderProgramResults(text, _pRows)}</div>`;
    } else if (_pRows.length > 0) {
      _html = renderProgramResults(text, _pRows);
      if (_cRows.length > 0)
        _html += `<div style="margin-top:12px"><p style="font-size:13px;font-weight:600;margin-bottom:8px">Courses available:</p>${renderCourseResults(text, _cRows, role)}</div>`;
    } else {
      // Still nothing — let the main AI answer conversationally with full context
      history.pop();
      history.push({ role: 'user', content: `[ROLE: ${role}][COLLEGE: N/A]\n${text}` });
      showTyping();
      try {
        const _apiRes = await fetch(AI_PROXY_URL || 'https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: AI_PROXY_URL ? {'Content-Type':'application/json'} : {
            'Content-Type':'application/json','x-api-key':apiKey,
            'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'
          },
          body: JSON.stringify({ model:'claude-haiku-4-5-20251001', max_tokens:600,
            system: buildSystemPrompt(role, text), messages: history })
        });
        const _d = await _apiRes.json();
        const _reply = Array.isArray(_d.content) ? _d.content.map(c=>c.text||'').join('') : (_d.reply||'');
        history.push({ role:'assistant', content:_reply });
        removeTyping();
        addBotMsg(formatReply(_reply));
      } catch(e) {
        removeTyping();
        addBotMsg(`<p>I couldn't find exact matches for "<strong>${escHtml(text)}</strong>" in the current catalog.</p><p>For the most up-to-date offerings, contact: ${generalContactHtml()}</p>`);
      }
      busy = false; document.getElementById('sendBtn').disabled = false;
      inp.focus(); showChips('default'); return;
    }

    addBotMsg(_html);
    history.push({ role: 'assistant', content: _html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim() });
    busy = false; document.getElementById('sendBtn').disabled = false;
    showChips('course_results'); return;
  }

  // ── DYNAMIC PROGRAM LOOKUP (for natural follow-ups) ───────
  if (isLikelyProgramLookup(text)) {
    const resultHtml = renderProgramLookupGuidance(text);
    addBotMsg(resultHtml);
    history.push({ role: 'user', content: text });
    history.push({ role: 'assistant', content: resultHtml.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim() });
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
    showChips('advising');
    return;
  }

  // ── COURSE CATALOG LOOKUP (runs FIRST for all roles) ──────
  // Must run before advisor check so "I need accounting classes"
  // shows courses first, then appends advisor tip underneath.
  if (isCourseLookup(text)) {
    history.push({ role: 'user', content: text });

    let cRows = searchCourses(text);

    // If nothing found, ask AI to interpret before giving up
    if (cRows.length === 0) {
      showTyping();
      const _aiResult = await searchCoursesWithAI(text);
      removeTyping();
      if (_aiResult && _aiResult.rows && _aiResult.rows.length > 0) {
        cRows = _aiResult.rows;
      }
    }

    let resultHtml   = renderCourseResults(text, cRows, role);

    // ── If student has a saved program, append advisor card ──
    // Give them the catalog data AND the right person to talk to
    if (role === 'Student' && selectedProgram) {
      const match = (kbData.programs || []).find(r =>
        (r['ProgramName']||'').toLowerCase() === selectedProgram.toLowerCase() &&
        (!selectedCollege || (r['CollegeID']||'').toLowerCase().includes(selectedCollege.toLowerCase()))
      );
      if (match) {
        resultHtml += `
          <div style="margin-top:12px">
            <p style="font-size:13px;margin-bottom:8px">
              <strong>Not sure which of these count toward your ${escHtml(selectedProgram)} degree?</strong>
              Your advisor can confirm which courses apply to your program:
            </p>
            ${renderAdvisorCard(match)}
            ${userFlags.trio && match['TRIO_Advisor'] ? renderTrioCard(match) : ''}
          </div>`;
      }
    }

    // ── If student has NO program yet, prompt them ───────────
    if (role === 'Student' && !selectedProgram && cRows.length > 0) {
      resultHtml += `
        <div style="margin-top:10px;padding:10px 12px;background:var(--blue-light);border-radius:8px;border:1px solid var(--blue-border);font-size:12.5px;color:#0C447C">
          <strong>Want to know which of these apply to your degree?</strong>
          Tell me your program and I'll connect you with the right advisor.
          <div style="margin-top:6px">
            <button style="font-size:12px;padding:4px 12px;border-radius:12px;border:1px solid var(--blue);background:transparent;color:var(--blue);cursor:pointer;font-family:inherit"
              onclick="document.getElementById('userInput').value='Who is my advisor?';sendMessage()">
              Find my advisor →
            </button>
          </div>
        </div>`;
    }

    addBotMsg(resultHtml);
    const botReply = resultHtml.replace(/<[^>]+>/g, ' ').replace(/\s+/g,' ').trim();
    history.push({ role: 'assistant', content: botReply });
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
    showChips('course_results');
    return;
  }

  // ── ADVISOR INTENT: pure advisor questions (no course subject) ─
  // e.g. "who is my advisor?", "I need advising", "degree plan help"
  // Note: "what classes should I take" is here but course questions
  // are caught above by isCourseLookup first.
  const isAdvisorQ = /who is my advisor|find my advisor|advisor|adviser|advising|what program|my program|degree plan|graduation|what classes should|asesor|asesora|consejero|consejera|mi programa|plan de grado|graduacion/.test(normalizeText(text));

  if (isAdvisorQ && role === 'Student') {
    if (!selectedProgram) {
      awaitingProgram = true;
      const chipHtml = renderProgramChips();
      const examples = getCollegeProgramNames().slice(0, 3).join(', ');
      addBotMsg(`
        <p>I'd love to help! To point you to the right advisor, what program are you in?</p>
        ${chipHtml || `<p style="font-size:12.5px;color:var(--text-3)">e.g. ${escHtml(examples) || 'Nursing, Accounting, Business'}</p>`}
        <p style="font-size:12.5px;color:var(--text-3);margin-top:8px">Or just type your program name below.</p>
      `);
      busy = false;
      document.getElementById('sendBtn').disabled = false;
      inp.focus();
      return;
    } else {
      const match = (kbData.programs || []).find(r =>
        (r['ProgramName']||'').toLowerCase() === selectedProgram.toLowerCase() &&
        (!selectedCollege || (r['CollegeID']||'').toLowerCase().includes(selectedCollege.toLowerCase()))
      );
      if (match) {
        let html = `<p>Here's your advisor for <strong>${escHtml(selectedProgram)}</strong>:</p>`;
        html += renderAdvisorCard(match);
        if (userFlags.trio && match['TRIO_Advisor']) {
          html += `<p style="margin-top:8px">Your TRIO advisor:</p>${renderTrioCard(match)}`;
        }
        addBotMsg(html);
        busy = false;
        document.getElementById('sendBtn').disabled = false;
        showChips('advisor');
        return;
      }
    }
  }



  // ── FLAGS ────────────────────────────────────────────────────
  if (/international student|i-20|sevis|visa|f-1|j-1/.test(text.toLowerCase())) userFlags.international = true;
  if (/trio|first generation|first-gen|low income/.test(text.toLowerCase())) userFlags.trio = true;

  if (detectIntent(text) === 'enrollment_info' && role === 'Prospect') {
    startEnrollmentFlow();
    busy = false;
    document.getElementById('sendBtn').disabled = false;
    inp.focus();
    return;
  }

  // ── AI CALL ──────────────────────────────────────────────────
  history.push({ role: 'user', content: `[ROLE: ${role}][COLLEGE: ${selectedCollege || 'N/A'}][PROGRAM: ${selectedProgram || 'N/A'}]\n${text}` });
  showTyping();

  try {
    const anthropicPayload = {
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 1000,
      system: buildSystemPrompt(role, text),
      messages: history
    };

    const proxyPayload = {
      ...anthropicPayload,
      lang,
      context: { role, selectedCollege, selectedProgram, userFlags }
    };

    let data;
    if (AI_PROXY_URL) {
      const res = await fetch(AI_PROXY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(proxyPayload)
      });
      if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || e.message || 'AI proxy error'); }
      data = await res.json();
    } else {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify(anthropicPayload)
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'API error'); }
      data = await res.json();
    }

    const reply = Array.isArray(data.content) ? data.content.map(c => c.text || '').join('') : (data.reply || data.text || '');
    history.push({ role: 'assistant', content: reply });
    removeTyping();
    addBotMsg(formatReply(reply));

  } catch(err) {
    removeTyping();
    console.error(err);
    const fallbackMsg = lang === 'es'
      ? `<p>Estoy teniendo problemas para conectarme con mi parte de IA en este momento.</p><p>Pero todavía puedo ayudarle con cursos, programas, asesores, Canvas y libros usando la base de conocimiento.</p>`
      : `<p>I’m having trouble connecting to my AI brain right now.</p><p>But I can still help with courses, programs, advisors, Canvas, and textbooks using the knowledge base.</p>`;
    addBotMsg(fallbackMsg);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  inp.focus();
  // Pick intent for contextual chips based on question
  const chipIntent = detectChipIntent(text);
  showChips(chipIntent);
}

/* ================================================================
   UI HELPERS
   ================================================================ */
function enableChat()  { document.getElementById('userInput').disabled = false; document.getElementById('sendBtn').disabled = false; document.getElementById('userInput').placeholder = t('ask_anything'); }
function disableChat() { document.getElementById('userInput').disabled = true;  document.getElementById('sendBtn').disabled = true; }

function scrollBottom() { const m = document.getElementById('messages'); m.scrollTop = m.scrollHeight; }

function addBotMsg(html) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="av bot">IC</div><div class="bubble">${html}</div>`;
  m.appendChild(d);
  // Scroll to show the TOP of the new message, not the bottom
  setTimeout(() => { d.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50);
}

function addUserMsg(text) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="av usr">You</div><div class="bubble">${escHtml(text)}</div>`;
  m.appendChild(d); scrollBottom();
}

function showTyping() {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.id = 'typing'; d.className = 'msg bot';
  d.innerHTML = '<div class="av bot">IC</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  m.appendChild(d); scrollBottom();
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight,110)+'px'; }
function handleKey(e)   { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

function escHtml(t) { return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function esc(t)     { return String(t||'').replace(/'/g,"\\'"); }

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val.startsWith('sk-')) { alert('Enter a valid Anthropic API key (starts with sk-ant-...)'); return; }
  apiKey = val;
  localStorage.setItem('iccoc_api_key', apiKey);
  document.getElementById('apiBanner').style.display = 'none';
  addBotMsg('<p>API key saved! Ready to help. 🎉</p>');
}

function formatReply(text) {
  text = escHtml(text)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>');

  const lines = text.split('\n');
  let html = '', inOl = false, inUl = false;
  let listCounter = 0;  // track actual numbering

  const closeList = () => {
    if (inOl) { html += '</ol>'; inOl = false; listCounter = 0; }
    if (inUl) { html += '</ul>'; inUl = false; }
  };

  for (const line of lines) {
    const olMatch = line.match(/^(\d+)\.\s+(.*)/);   // "1. text" or "3. text"
    const ulMatch = line.match(/^[-•*]\s+(.*)/);        // "- text" or "• text"

    if (olMatch) {
      const num  = parseInt(olMatch[1], 10);
      const text = olMatch[2];

      if (!inOl) {
        closeList();
        // Start ol at the actual number from the AI output
        html += `<ol start="${num}">`;
        inOl = true;
        listCounter = num;
      } else {
        // If AI restarted numbering at 1 mid-list, close and reopen
        if (num === 1 && listCounter > 1) {
          html += '</ol>';
          html += '<ol>';
          listCounter = 1;
        }
      }
      html += `<li>${text}</li>`;
      listCounter++;

    } else if (ulMatch) {
      if (!inUl) { closeList(); html += '<ul>'; inUl = true; }
      html += `<li>${ulMatch[1]}</li>`;

    } else {
      closeList();
      const trimmed = line.trim();
      if (trimmed) {
        // Render horizontal rules
        if (/^---+$/.test(trimmed)) {
          html += '<hr style="margin:8px 0;border:none;border-top:1px solid var(--border)">';
        } else {
          html += `<p>${trimmed}</p>`;
        }
      }
    }
  }
  closeList();
  return html;
}
