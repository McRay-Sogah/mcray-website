<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICCOC Canvas Assistant</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:        #185FA5;
    --blue-light:  #E6F1FB;
    --blue-border: #B5D4F4;
    --green:       #1D9E75;
    --amber:       #854F0B;
    --amber-bg:    #fffbeb;
    --amber-border:#fde68a;
    --red:         #A32D2D;
    --red-bg:      #FCEBEB;
    --text:        #1a1a1a;
    --text-muted:  #6b7280;
    --text-hint:   #9ca3af;
    --bg:          #ffffff;
    --bg-surface:  #f9fafb;
    --bg-input:    #f3f4f6;
    --border:      rgba(0,0,0,0.10);
    --border-med:  rgba(0,0,0,0.18);
    --radius:      12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .shell {
    width: 100%;
    max-width: 800px;
    background: var(--bg);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    height: 92vh;
    max-height: 860px;
    overflow: hidden;
  }

  .header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    flex-shrink: 0;
  }

  .logo {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--blue);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo svg { width: 20px; height: 20px; }

  .header-info h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .header-info p {
    font-size: 11.5px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11.5px;
    color: var(--text-muted);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #ccc;
  }

  .dot.online  { background: var(--green); }
  .dot.loading { background: #F59E0B; animation: pulse 1s infinite; }
  .dot.error   { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .kb-banner {
    padding: 8px 20px;
    background: var(--blue-light);
    border-bottom: 1px solid var(--blue-border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #0C447C;
    flex-shrink: 0;
  }

  .kb-banner.error {
    background: var(--red-bg);
    border-color: #F09595;
    color: var(--red);
  }

  .kb-banner.hidden { display: none; }

  .context-bar {
    padding: 9px 20px;
    border-bottom: 1px solid var(--border);
    display: none;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
    background: var(--bg);
  }

  .context-pill {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    background: var(--bg-surface);
    color: var(--text-muted);
  }

  .context-change {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--blue-border);
    background: var(--blue-light);
    color: var(--blue);
    cursor: pointer;
    font-family: inherit;
  }

  .messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb {
    background: var(--border-med);
    border-radius: 2px;
  }

  .msg {
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .msg.user { flex-direction: row-reverse; }

  .av {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10.5px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .av.bot {
    background: var(--blue-light);
    color: var(--blue);
    border: 1px solid var(--blue-border);
  }

  .av.usr {
    background: var(--bg-input);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  .bubble {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 13.5px;
    line-height: 1.65;
  }

  .msg.bot .bubble {
    background: var(--bg-surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px 12px 12px 12px;
  }

  .msg.user .bubble {
    background: var(--blue);
    color: white;
    border-radius: 12px 4px 12px 12px;
  }

  .bubble p { margin-bottom: 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ol {
	  padding-left: 20px;
	  margin: 8px 0;
	}

	.bubble ul {
	  padding-left: 28px; /* 👈 deeper indent for bullets */
	  margin: 6px 0 10px;
	}

	.bubble li {
	  margin-bottom: 6px;
	}
  .bubble li { margin-bottom: 4px; }
  .bubble strong { font-weight: 600; }

  .choice-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .choice-btn {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    background: white;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }

  .choice-btn:hover {
    background: var(--bg-surface);
    border-color: var(--blue);
    color: var(--text);
  }

  .chips {
    padding: 4px 20px 10px;
    display: none;
    gap: 6px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .chip {
    font-size: 12px;
    font-family: inherit;
    padding: 5px 11px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover {
    background: var(--bg-surface);
    color: var(--text);
    border-color: var(--blue);
  }

  .input-row {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .input-row textarea {
    flex: 1;
    font-family: inherit;
    font-size: 13.5px;
    padding: 9px 13px;
    border: 1px solid var(--border-med);
    border-radius: 10px;
    resize: none;
    outline: none;
    background: var(--bg-input);
    color: var(--text);
    line-height: 1.5;
    min-height: 40px;
    max-height: 110px;
    transition: border-color 0.15s;
  }

  .input-row textarea:focus {
    border-color: var(--blue);
    background: var(--bg);
  }

  .input-row textarea::placeholder {
    color: var(--text-hint);
  }

  .input-row textarea:disabled {
    background: #f7f7f7;
    color: var(--text-hint);
    cursor: not-allowed;
  }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--blue);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }

  .send-btn:hover { opacity: 0.88; }
  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled {
    opacity: 0.38;
    cursor: not-allowed;
  }

  .send-btn svg { width: 16px; height: 16px; }

  .typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 2px 0;
  }

  .typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-hint);
    animation: bop 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bop {
    0%, 80%, 100% { transform: translateY(0); opacity: .4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  .typing-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .typing-text {
    font-size: 12.5px;
    color: var(--text-muted);
  }

  .footer {
    padding: 8px 20px;
    text-align: center;
    font-size: 11px;
    color: var(--text-hint);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .kb-stats {
    font-size: 11px;
    color: var(--text-hint);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 10px;
    margin-left: 8px;
    white-space: nowrap;
  }

  .loadingBot {
    display: flex;
    align-items: center;
    margin-top: 2px;
    font-family: Arial, sans-serif;
  }

  .loading-text {
    margin: 0;
    font-size: 13px;
    font-weight: 500;
    color: #0C447C;
    letter-spacing: 0.2px;
    white-space: nowrap;
    transform: translateX(0);
    animation: slideText 1.6s ease-in-out infinite;
  }

  @keyframes slideText {
    0% { transform: translateX(0); }
    50% { transform: translateX(14px); }
    100% { transform: translateX(0); }
  }

  #appContent {
    display: none;
    opacity: 0;
    transition: opacity 0.4s ease;
    flex: 1;
    min-height: 0;
    flex-direction: column;
  }

  .bubble hr {
    margin: 12px 0;
    border: none;
    border-top: 1px solid rgba(0,0,0,0.10);
  }
</style>
</head>
<body>

<div class="shell">
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2L3 6v8l7 4 7-4V6L10 2z" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M10 2v12M3 6l7 4 7-4" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="header-info">
      <h1>ICCOC Canvas Assistant</h1>
      <p>Iowa Community College Online Consortium</p>
    </div>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">Loading...</span>
      <span class="kb-stats" id="kbStats" style="display:none"></span>
    </div>
  </div>

  <div class="kb-banner" id="kbBanner">
    <div id="loadingMessage" class="loadingBot">
      <p class="loading-text">Connecting you to the right source...</p>
    </div>
  </div>

  <div id="appContent">
    <div class="context-bar" id="contextBar">
      <span class="context-pill" id="rolePill">Role: —</span>
      <span class="context-pill" id="collegePill">College: —</span>
      <span class="context-pill" id="programPill" style="display:none">Program: —</span>
      <button class="context-change" onclick="restartOnboarding()">Change</button>
    </div>

    <div class="messages" id="messages"></div>
    <div class="chips" id="chips"></div>

    <div class="input-row">
      <textarea id="userInput" placeholder="Complete the setup above to begin..."
        rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M14 8L2 2l2.5 6L2 14l12-6z" fill="white"/>
        </svg>
      </button>
    </div>

    <div class="footer">ICCOC Canvas Assistant · Powered by McRay from NCC</div>
  </div>
</div>

<script>
const SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzCC_ETCmcqMenHOIgILqCsI4USDO3D7htwqoUVWa_bKPtH_--fsRJuxlTnnO0WObzaSg/exec";

let apiKey = localStorage.getItem('iccoc_api_key') || '';
let role = '';
let history = [];
let busy = false;
let kbData = null;
let selectedCollege = '';
let onboardingStep = 'role';
let selectedProgram = localStorage.getItem('iccoc_program') || '';
let userFlags = {
  internationalStudent: false,
  trioStudent: false
};

const DEFAULT_CHIPS = {
  Student: [
    'How do I submit an assignment?',
    'Where do I see my grades?',
    'I can\'t log into Canvas',
    'Where is my course?',
    'How do I message my instructor?'
  ],
  Instructor: [
    'Where do I create announcements?',
    'How do I set up a quiz?',
    'How do I build my syllabus?',
    'Where is the gradebook?',
    'How do I add content to a module?'
  ],
  Admin: [
    'How do I add a user to Canvas?',
    'How do I create a new course?',
    'How do I do a bulk enrollment?',
    'Where are account-level settings?',
    'How do I add an LTI tool?'
  ]
};

window.addEventListener('DOMContentLoaded', () => {
  setStatus('loading');
  loadKnowledgeBase();
});

async function loadKnowledgeBase() {
  if (!SHEET_API_URL || SHEET_API_URL === "PASTE_YOUR_APPS_SCRIPT_URL_HERE") {
    document.getElementById('kbBanner').textContent =
      '⚠️ No Google Sheet URL configured yet — using built-in knowledge.';

    setTimeout(() => {
      showApp();
      kbData = null;
      renderWelcomeFlow();
      setStatus('online');
    }, 3000);
    return;
  }

  try {
    const res = await fetch(SHEET_API_URL);
    const data = await res.json();

    if (data.status !== 'ok') {
      throw new Error(data.message || 'Sheet returned an error');
    }

    kbData = data;
    const cfg = data.config || {};

    if (cfg.APP_TITLE) {
      document.querySelector('.header-info h1').textContent = cfg.APP_TITLE;
      document.title = cfg.APP_TITLE;
    }

    if (!apiKey && data.apiKey && data.apiKey.startsWith('sk-')) {
      apiKey = data.apiKey;
      localStorage.setItem('iccoc_api_key', apiKey);
    }

    const faqCount = (data.faq || []).length;
    const vendorCount = (data.vendors || []).length;
    const textbookCount = (data.textbooks || []).length;
    const contactCount = (data.contacts || []).length;
    const collegeCount = (data.colleges || []).length;
    const programCount = (data.programs || []).length;
    const serviceCount = (data.services || []).length;
    const total = faqCount + vendorCount + textbookCount + contactCount + collegeCount + programCount + serviceCount;

    const statsEl = document.getElementById('kbStats');
    statsEl.textContent = `${total} KB entries`;
    statsEl.style.display = 'inline';

    showApp();
    renderWelcomeFlow();
    setStatus('online');
  } catch (err) {
    const banner = document.getElementById('kbBanner');
    if (banner) {
      banner.textContent = `⚠️ Could not load knowledge base: ${err.message}. Using built-in fallback.`;
      banner.classList.add('error');
    }

    kbData = null;
    showApp();
    renderWelcomeFlow();
    setStatus('online');
  }
}

function showApp() {
  const kbBanner = document.getElementById('kbBanner');
  if (kbBanner && !kbBanner.classList.contains('error')) {
    kbBanner.classList.add('hidden');
  }

  const appContent = document.getElementById('appContent');
  if (appContent) {
    appContent.style.display = 'flex';
    setTimeout(() => {
      appContent.style.opacity = '1';
    }, 50);
  }
}

function setStatus(state) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');

  const states = {
    loading: { cls: 'loading', label: 'Loading KB...' },
    online:  { cls: 'online',  label: 'Online' },
    error:   { cls: 'error',   label: 'Error' }
  };

  const s = states[state] || states.online;
  dot.className = `dot ${s.cls}`;
  text.textContent = s.label;
}

function escHtml(t) {
  return String(t || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function addBotMsg(html) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = `<div class="av bot">IC</div><div class="bubble">${html}</div>`;
  m.appendChild(d);
  scrollBottom();
}

function addUserMsg(text) {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg user';
  d.innerHTML = `<div class="av usr">You</div><div class="bubble">${escHtml(text)}</div>`;
  m.appendChild(d);
  scrollBottom();
}

function addChoiceMsg(html) {
  addBotMsg(html);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function showTyping() {
  const m = document.getElementById('messages');
  const d = document.createElement('div');
  d.id = 'typing';
  d.className = 'msg bot';
  d.innerHTML = `
    <div class="av bot">IC</div>
    <div class="bubble">
      <div class="typing-wrap">
        <span class="typing-text">Assistant is typing</span>
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  `;
  m.appendChild(d);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function enableChat() {
  document.getElementById('userInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').placeholder = 'Ask anything about Canvas…';
}

function disableChat() {
  document.getElementById('userInput').disabled = true;
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('userInput').placeholder = 'Complete the setup above to begin...';
}

function showChips() {
  renderChips();
  document.getElementById('chips').style.display = 'flex';
}

function hideChips() {
  document.getElementById('chips').style.display = 'none';
}

function updateContextBar() {
  const bar = document.getElementById('contextBar');
  const rolePill = document.getElementById('rolePill');
  const collegePill = document.getElementById('collegePill');
  const programPill = document.getElementById('programPill');

  if (onboardingStep === 'done') {
    rolePill.textContent = `Role: ${role}`;
    collegePill.textContent = `College: ${selectedCollege}`;

    if (selectedProgram) {
      programPill.textContent = `Program: ${selectedProgram}`;
      programPill.style.display = 'inline-block';
    } else {
      programPill.style.display = 'none';
    }

    bar.style.display = 'flex';
  } else {
    bar.style.display = 'none';
  }
}

function restartOnboarding() {
  role = '';
  selectedCollege = '';
  selectedProgram = '';
  userFlags = { internationalStudent: false, trioStudent: false };
  localStorage.removeItem('iccoc_program');
  onboardingStep = 'role';
  history = [];
  hideChips();
  disableChat();
  updateContextBar();
  renderWelcomeFlow();
}

function renderRoleChoices() {
  return `
    <div class="choice-wrap">
      <button class="choice-btn" onclick="selectRole('Student')">Student</button>
      <button class="choice-btn" onclick="selectRole('Instructor')">Instructor</button>
      <button class="choice-btn" onclick="selectRole('Admin')">Admin</button>
    </div>
  `;
}

function getActiveColleges() {
  if (!kbData || !kbData.colleges) return [];

  return kbData.colleges
    .slice()
    .sort((a, b) => Number(a.SortOrder || 999) - Number(b.SortOrder || 999));
}

function renderCollegeChoices() {
  const colleges = getActiveColleges();
  const list = colleges.length
    ? colleges.map(row =>
        `<button class="choice-btn" onclick="selectCollege('${String(row.CollegeName || '').replace(/'/g, "\\'")}')">${escHtml(row.CollegeName || '')}</button>`
      ).join('')
    : `
      <button class="choice-btn" onclick="selectCollege('Northwest Iowa CC')">Northwest Iowa CC</button>
      <button class="choice-btn" onclick="selectCollege('Iowa Lakes CC')">Iowa Lakes CC</button>
      <button class="choice-btn" onclick="selectCollege('Western Iowa Tech CC')">Western Iowa Tech CC</button>
    `;

  return `<div class="choice-wrap">${list}</div>`;
}

function selectRole(selectedRole) {
  role = selectedRole;
  onboardingStep = 'college';
  renderWelcomeFlow();
}

function selectCollege(collegeName) {
  selectedCollege = collegeName;
  onboardingStep = 'done';
  history = [];
  updateContextBar();
  enableChat();
  showChips();
  renderWelcomeFlow();
}

function getAssistantCapabilitiesLine() {
  let parts = ['Canvas'];

  if (kbData?.textbooks?.length) parts.push('textbooks');

  // ✅ THIS IS WHERE YOUR NEW CODE GOES
  if (role === 'Student') {
    if (kbData?.programs?.length) parts.push('your advisor');
    if (kbData?.services?.length) parts.push('student support');
  }
  else if (role === 'Instructor') {
    parts.push('course tools');
    parts.push('teaching support');
  }
  else if (role === 'Admin') {
    parts.push('course management');
    parts.push('account support');
  }

  if (selectedProgram && role === 'Student') {
    parts = parts.map(p => p === 'your advisor' ? `${selectedProgram} advisor` : p);
  }

  if (parts.length === 1) {
    return `Ask me anything about ${parts[0]}, and I’ll guide you step by step.`;
  }

  if (parts.length === 2) {
    return `Ask me about ${parts[0]} and ${parts[1]}, and I’ll guide you step by step.`;
  }

  const last = parts.pop();
  return `Ask me about ${parts.join(', ')}, and ${last} — I’ll help you find exactly what you need.`;
}


function renderWelcomeFlow() {
  const messages = document.getElementById('messages');
  messages.innerHTML = '';

  if (onboardingStep === 'role') {
    hideChips();
    disableChat();
    updateContextBar();

function formatReply(text) {
  text = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>');

  const lines = text.split('\n');
  let html = '';
  let inOl = false;
  let inUl = false;

  function closeLists() {
    if (inUl) {
      html += '</ul>';
      inUl = false;
    }
    if (inOl) {
      html += '</ol>';
      inOl = false;
    }
  }

  for (let rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;

    const hrMatch = line.match(/^---+$/);
    const olMatch = line.match(/^\d+\.\s+(.*)/);
    const ulMatch = line.match(/^[-•]\s+(.*)/);

    if (hrMatch) {
      closeLists();
      html += `<hr>`;
      continue;
    }

    if (line.toLowerCase() === 'need help?') {
      closeLists();
      html += `<p><strong>Need help?</strong></p>`;
      continue;
    }

    if (olMatch) {
      if (inUl) {
        html += '</ul>';
        inUl = false;
      }
      if (!inOl) {
        html += '<ol>';
        inOl = true;
      }
      html += `<li>${olMatch[1]}</li>`;
      continue;
    }

    if (ulMatch) {
      if (inOl) {
        html += '</ol>';
        inOl = false;
      }
      if (!inUl) {
        html += '<ul>';
        inUl = true;
      }
      html += `<li>${ulMatch[1]}</li>`;
      continue;
    }

    closeLists();
    html += `<p>${line}</p>`;
  }

  closeLists();
  return html;
}

function norm(v) {
  return (v || '').toString().trim();
}

function lower(v) {
  return norm(v).toLowerCase();
}

function upperText(text) {
  return norm(text).toUpperCase();
}

function normalizeCourseCode(text) {
  const t = upperText(text);
  const compact = t.replace(/\s+/g, ' ').trim();
  const m = compact.match(/\b([A-Z]{2,5})[\s\-]?(\d{2,4}[A-Z]?)\b/);
  if (m) return `${m[1]}-${m[2]}`;
  return '';
}

function extractEntities(input) {
  const text = upperText(input);

  const courseCode = normalizeCourseCode(text);
  const college = (text.match(/\b(NCC|WITCC|EICC|ILCC|SWCC|NIACC)\b/) || [])[0] || '';

  const termPatterns = [
    { re: /\bSUMMER\s*2026\b/, value: 'Summer 2026' },
    { re: /\bFALL\s*2026\b/, value: 'Fall 2026' },
    { re: /\bSPRING\s*2027\b/, value: 'Spring 2027' },
    { re: /\bWINTER(?:IM)?\s*(?:2026|2027|26\/27|2627)\b/, value: 'Winterim 2026/2027' }
  ];
  const term = (termPatterns.find(p => p.re.test(text)) || {}).value || '';

  let vendor = (text.match(/\b(PEARSON|CENGAGE|MCGRAW(?:\s*HILL)?|WILEY|ELSEVIER|VITALSOURCE|SAGE|CAMBRIDGE)\b/) || [])[0] || '';
  if (vendor === 'MCGRAW' || vendor === 'MCGRAW HILL') vendor = 'McGraw Hill';

  let author = '';
  const byMatch = input.match(/\b(?:by|authored by)\s+([A-Za-z][A-Za-z\-' ]{1,40})/i);
  if (byMatch) author = norm(byMatch[1]).replace(/[?.!,;:]+$/, '');

  return { courseCode, college, term, vendor, author };
}

function detectProgramFromMessage(q) {
  if (!kbData || !kbData.programs) return '';

  const x = lower(q);

  const matches = (kbData.programs || []).filter(row => {
    const collegeOk = !selectedCollege ||
      lower(row.College || '').includes(lower(selectedCollege)) ||
      lower(selectedCollege).includes(lower(row.College || ''));

    if (!collegeOk) return false;

    const programName = lower(row.ProgramName || '');
    const department = lower(row.Department || '');
    const keywords = lower(row.Keywords || '');

    return (
      (programName && x.includes(programName)) ||
      (department && x.includes(department)) ||
      (keywords && keywords.split(/[;,]/).some(k => k.trim() && x.includes(k.trim())))
    );
  });

  if (!matches.length) return '';

  matches.sort((a, b) => {
    const aExact = lower(q).includes(lower(a.ProgramName || '')) ? 1 : 0;
    const bExact = lower(q).includes(lower(b.ProgramName || '')) ? 1 : 0;
    return bExact - aExact;
  });

  return matches[0].ProgramName || '';
}

function score(row, query, roleValue = '') {
  const q = lower(query);
  if (!q) return 0;

  const courseCode    = lower(row.CourseCode || row['CourseCode']);
  const courseTitle   = lower(row.CourseTitle || row['CourseTitle']);
  const textbookTitle = lower(row.TextbookTitle || row['TextbookTitle']);
  const author        = lower(row.Author || row['Author']);
  const edition       = lower(row.Edition || row['Edition']);
  const publisher     = lower(row.Publisher || row['Publisher']);
  const isbn          = lower(row.ISBN || row['ISBN']);
  const vendor        = lower(row.Vendor || row['Vendor']);
  const college       = lower(row.College || row['College']);
  const term          = lower(row.Term || row['Term']);
  const accessType    = lower(row.AccessType || row['AccessType']);
  const notes         = lower(row.Notes || row['Notes']);
  const audience      = lower(row.Audience || row['Audience']);
  const category      = lower(row.Category || row['Category']);
  const userSays      = lower(row['User Says']);
  const triggerKw     = lower(row['Trigger Keywords'] || row['Keywords']);
  const shortAnswer   = lower(row['Short Answer']);
  const steps         = lower(row['Step-by-Step']);
  const issueType     = lower(row['IssueType']);
  const intent        = lower(row['Intent']);
  const programName   = lower(row.ProgramName || row['ProgramName']);
  const departmentName = lower(row.Department || row['Department']);
  const serviceName   = lower(row.ServiceName || row['ServiceName']);
  const categoryName  = lower(row.Category || row['Category']);
  const advisorNotes  = lower(row.AdvisorNotes || row['AdvisorNotes']);
  const primaryAdvisor = lower(row.PrimaryAdvisorName || row['PrimaryAdvisorName']);
  const primaryContact = lower(row.PrimaryContactName || row['PrimaryContactName']);

  const blob = [
    courseCode, courseTitle, textbookTitle, author, edition, publisher, isbn, vendor,
    college, term, accessType, notes, audience, category, userSays, triggerKw,
    shortAnswer, steps, issueType, intent,
    programName, departmentName, serviceName, categoryName, advisorNotes, primaryAdvisor, primaryContact
  ].join(' ');

  const tokens = q.split(/[\s,;:()\/]+/).map(t => t.trim()).filter(Boolean);
  let s = 0;

  if (isbn && isbn === q) s += 100;
  if (courseCode && courseCode === q) s += 85;
  if (courseTitle && courseTitle === q) s += 75;
  if (textbookTitle && textbookTitle === q) s += 75;
  if (author && author === q) s += 70;

  if (courseCode && courseCode.includes(q)) s += 55;
  if (courseTitle && courseTitle.includes(q)) s += 45;
  if (textbookTitle && textbookTitle.includes(q)) s += 45;
  if (author && author.includes(q)) s += 42;
  if (publisher && publisher.includes(q)) s += 30;
  if (vendor && vendor.includes(q)) s += 26;
  if (college && college.includes(q)) s += 20;
  if (term && term.includes(q)) s += 16;
  if (blob.includes(q)) s += 8;

  if (programName && programName.includes(q)) s += 45;
  if (departmentName && departmentName.includes(q)) s += 30;
  if (serviceName && serviceName.includes(q)) s += 45;
  if (categoryName && categoryName.includes(q)) s += 22;
  if (advisorNotes && advisorNotes.includes(q)) s += 20;
  if (primaryAdvisor && primaryAdvisor.includes(q)) s += 18;
  if (primaryContact && primaryContact.includes(q)) s += 18;

  if (selectedProgram && programName && programName.includes(lower(selectedProgram))) s += 120;
  if (selectedProgram && advisorNotes && advisorNotes.includes(lower(selectedProgram))) s += 18;

  if (userFlags.internationalStudent && (serviceName.includes('international') || categoryName.includes('international') || notes.includes('international') || triggerKw.includes('international'))) {
    s += 80;
  }

  if (userFlags.trioStudent && (serviceName.includes('trio') || categoryName.includes('academic support') || notes.includes('trio') || triggerKw.includes('trio'))) {
    s += 55;
  }

  for (const token of tokens) {
    if (token.length < 2) continue;

    if (courseCode === token) s += 40;
    if (isbn === token) s += 55;
    if (author === token) s += 38;
    if (college === token) s += 18;

    if (courseCode.includes(token)) s += 22;
    if (courseTitle.includes(token)) s += 16;
    if (textbookTitle.includes(token)) s += 16;
    if (author.includes(token)) s += 18;
    if (publisher.includes(token)) s += 10;
    if (vendor.includes(token)) s += 10;
    if (college.includes(token)) s += 8;
    if (term.includes(token)) s += 8;
    if (notes.includes(token)) s += 4;
    if (triggerKw.includes(token)) s += 7;
    if (userSays.includes(token)) s += 6;
    if (shortAnswer.includes(token)) s += 3;
    if (steps.includes(token)) s += 2;

    if (programName.includes(token)) s += 16;
    if (departmentName.includes(token)) s += 12;
    if (serviceName.includes(token)) s += 16;
    if (categoryName.includes(token)) s += 10;
    if (advisorNotes.includes(token)) s += 8;
    if (primaryAdvisor.includes(token)) s += 8;
    if (primaryContact.includes(token)) s += 8;
  }

  const textbookIntentWords = [
    'textbook','book','books','isbn','author','edition','publisher',
    'pearson','cengage','mcgraw','wiley','heintz','weygandt'
  ];

  if (textbookIntentWords.some(word => q.includes(word))) {
    if (row.TextbookTitle || row.Author || row.ISBN) s += 20;
  }

  if (roleValue && audience && audience === roleValue.toLowerCase()) s += 10;
  if ((row['Priority'] || '').toLowerCase() === 'high') s += 3;

  return s;
}

function lookupTextbooks(query) {
  if (!kbData || !kbData.textbooks) return [];

  const rows = kbData.textbooks || [];
  const entities = extractEntities(query);
  const q = lower(query);

  let results = rows
    .map(row => ({ row, score: score(row, query, role) }))
    .filter(x => x.score > 0);

  results.forEach(x => {
    const row = x.row;
    const rowCourse = upperText(row.CourseCode);
    const rowCollege = upperText(row.College);
    const rowTerm = norm(row.Term);
    const rowAuthor = lower(row.Author);
    const rowCourseTitle = lower(row.CourseTitle);
    const rowTextbookTitle = lower(row.TextbookTitle);

    if (entities.courseCode && rowCourse === entities.courseCode) x.score += 120;
    if (entities.college && rowCollege === entities.college) x.score += 50;
    if (entities.term && rowTerm === entities.term) x.score += 40;
    if (entities.author && rowAuthor.includes(lower(entities.author))) x.score += 70;

    if (!entities.courseCode && q.length > 5) {
      if (rowCourseTitle.includes(q)) x.score += 60;
      if (rowTextbookTitle.includes(q)) x.score += 35;
    }
  });

  if (questionLooksLikeAuthorSearch(query) && entities.author) {
    const authorHits = results.filter(x =>
      lower(x.row.Author).includes(lower(entities.author))
    );
    if (authorHits.length) results = authorHits;
  }

  if (entities.courseCode) {
    const exactCourse = results.filter(x =>
      upperText(x.row.CourseCode) === entities.courseCode
    );
    if (exactCourse.length) results = exactCourse;
  }

  if (entities.college) {
    const byCollege = results.filter(x =>
      upperText(x.row.College) === entities.college
    );
    if (byCollege.length) results = byCollege;
  }

  if (entities.term) {
    const byTerm = results.filter(x =>
      norm(x.row.Term) === entities.term
    );
    if (byTerm.length) results = byTerm;
  }

  results.sort((a, b) => b.score - a.score);

  const seen = new Set();
  const deduped = [];
  for (const item of results) {
    const k = [
      item.row.Term,
      item.row.College,
      item.row.CourseCode,
      item.row.TextbookTitle,
      item.row.ISBN
    ].join('|');

    if (seen.has(k)) continue;
    seen.add(k);
    deduped.push(item.row);

    if (deduped.length >= 8) break;
  }

  return deduped;
}

function lookupVendors(query) {
  if (!kbData || !kbData.vendors) return [];

  return (kbData.vendors || [])
    .map(row => ({ row, score: score(row, query, role) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5)
    .map(x => x.row);
}

function lookupFaq(query, currentRole) {
  if (!kbData || !kbData.faq) return [];

  const rows = (kbData.faq || []).filter(row => {
    const a = lower(row['Audience']);
    return a === lower(currentRole) || a === 'all';
  });

  return rows
    .map(row => ({ row, score: score(row, query, currentRole) }))
    .filter(x => x.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12)
    .map(x => x.row);
}

function lookupPrograms(query) {
  if (!kbData || !kbData.programs) return [];

  let results = (kbData.programs || [])
    .filter(row => {
      const rowCollege = lower(row.College || '');
      const selected = lower(selectedCollege || '');

      const collegeMatch =
        !selected ||
        rowCollege === selected ||
        rowCollege.includes(selected) ||
        selected.includes(rowCollege);

      const selectedProgramMatch =
        !selectedProgram ||
        lower(row.ProgramName || '').includes(lower(selectedProgram)) ||
        lower(selectedProgram).includes(lower(row.ProgramName || ''));

      return collegeMatch && selectedProgramMatch;
    })
    .map(row => ({ row, score: score(row, query, role) }))
    .filter(x => x.score > 0);

  if (!results.length && selectedProgram) {
    results = (kbData.programs || [])
      .filter(row => {
        const rowCollege = lower(row.College || '');
        const selected = lower(selectedCollege || '');

        const collegeMatch =
          !selected ||
          rowCollege === selected ||
          rowCollege.includes(selected) ||
          selected.includes(rowCollege);

        return collegeMatch;
      })
      .map(row => ({ row, score: score(row, query + ' ' + selectedProgram, role) }))
      .filter(x => x.score > 0);
  }

  results.sort((a, b) => b.score - a.score);
  return results.slice(0, 5).map(x => x.row);
}

function lookupSupportServices(query) {
  if (!kbData || !kbData.services) return [];

  let results = (kbData.services || [])
    .filter(row => {
      const rowCollege = lower(row.College || '');
      const selected = lower(selectedCollege || '');
      return !selected ||
             rowCollege === selected ||
             rowCollege.includes(selected) ||
             selected.includes(rowCollege);
    })
    .map(row => ({ row, score: score(row, query, role) }))
    .filter(x => x.score > 0);

  results.sort((a, b) => b.score - a.score);
  return results.slice(0, 5).map(x => x.row);
}

    vendorText = '\n=== VENDOR / TEXTBOOK SUPPORT ===\n';
    vendorRows.forEach(row => {
      vendorText += `\nVendor: ${row['Vendor'] || ''}\nIssue: ${row['IssueType'] || ''}\nAnswer: ${row['Short Answer'] || ''}\nSteps: ${row['Step-by-Step'] || ''}\nSupport: ${row['SupportLink'] || ''}\nEscalation: ${row['Escalation'] || ''}\n---`;
    });
  }

  let textbookText = '';
  if (textbookRows.length) {
    textbookText = '\n=== EXACT TEXTBOOK MATCHES ===\n';
    textbookRows.forEach(row => {
      textbookText += `\nTerm: ${row['Term'] || ''}\nCollege: ${row['College'] || ''}\nCourse: ${row['CourseCode'] || ''} — ${row['CourseTitle'] || ''}\nTextbook: ${row['TextbookTitle'] || ''}\nAuthor: ${row['Author'] || ''}\nEdition: ${row['Edition'] || ''}\nPublisher: ${row['Publisher'] || ''}\nISBN: ${row['ISBN'] || ''}\nVendor: ${row['Vendor'] || ''}\nAccess Type: ${row['AccessType'] || ''}\nHow to Access: ${row['AccessInstructions'] || ''}\nNotes: ${row['Notes'] || ''}\nSupport: ${row['SupportLink'] || ''}\n---`;
    });
  }

  let programText = '';
  if (programRows.length) {
    programText = '\n=== PROGRAM ADVISING CONTACTS ===\n';
    programRows.forEach(row => {
      programText += `
College: ${row['College'] || ''}
Program: ${row['ProgramName'] || ''}
Department: ${row['Department'] || ''}
Degree Level: ${row['DegreeLevel'] || ''}
Primary Advisor: ${row['PrimaryAdvisorName'] || ''} | ${row['PrimaryAdvisorEmail'] || ''} | ${row['PrimaryAdvisorPhone'] || ''} | ${row['PrimaryAdvisorOffice'] || ''}
Secondary Advisor: ${row['SecondaryAdvisorName'] || ''} | ${row['SecondaryAdvisorEmail'] || ''} | ${row['SecondaryAdvisorPhone'] || ''} | ${row['SecondaryAdvisorOffice'] || ''}
Advisor Notes: ${row['AdvisorNotes'] || ''}
Keywords: ${row['Keywords'] || ''}
---`;
    });
  }

  let serviceText = '';
  if (serviceRows.length) {
    serviceText = '\n=== STUDENT SUPPORT SERVICES ===\n';
    serviceRows.forEach(row => {
      serviceText += `
College: ${row['College'] || ''}
Service: ${row['ServiceName'] || ''}
Category: ${row['Category'] || ''}
Primary Contact: ${row['PrimaryContactName'] || ''} | ${row['PrimaryContactEmail'] || ''} | ${row['PrimaryContactPhone'] || ''}
Office: ${row['OfficeLocation'] || ''}
Notes: ${row['Notes'] || ''}
Keywords: ${row['Keywords'] || ''}
---`;
    });
  }

  const contactRows = kbData.contacts || [];
  let contactText = '';
  if (contactRows.length) {
    contactText = '\n=== ESCALATION CONTACTS ===\n';
    contactRows.forEach(row => {
      contactText += `${row['Org/Role'] || ''}: ${row['Contact'] || ''} | ${row['Email'] || ''} | ${row['Phone'] || ''} — When: ${row['When to Escalate'] || ''}\n`;
    });
  }

  return `You are the ICCOC Canvas Assistant — friendly, knowledgeable, patient, and supportive.
User role: ${currentRole}
User college: ${selectedCollege || 'Not provided'}
User program: ${selectedProgram || 'Not provided'}
User is international student: ${userFlags.internationalStudent ? 'Yes' : 'No'}
User is TRIO student: ${userFlags.trioStudent ? 'Yes' : 'No'}

INSTRUCTIONS:
- Answer using ONLY the knowledge below
- Give numbered step-by-step directions only when steps are truly needed
- Do NOT force numbered steps for simple routing/contact answers
- Use bullet points only for sub-points or contact details
- Use exact Canvas menu names when discussing Canvas
- Warm, professional tone
- Begin every answer with a short, friendly, human-sounding opener that fits the user's question
- Keep the opener natural and brief
- If the user asks who handles something, clearly route them
- If the user asks what role is currently selected, answer directly from the saved User role
- If the user asks what college is currently selected, answer directly from the saved User college
- If the user asks what program is saved, answer directly from the saved User program
- If the user has already provided a program, DO NOT ask for it again
- Use the saved program to match and display the correct academic advisor

- For textbook questions, prioritize the EXACT TEXTBOOK MATCHES section first
- If exact textbook matches are present, do NOT say you lack textbook data
- If the user asks by author, use the Author field from the textbook matches
- If multiple textbook rows are shown, summarize the most relevant ones clearly

- For academic advising, course selection, registration planning, full-time status, modality, and graduation-path questions, do NOT act like the student's academic advisor
- Instead, give a short caution that these decisions should be confirmed with the correct advisor, then provide the best matching advisor contact from PROGRAM ADVISING CONTACTS
- For TRIO, international student, registrar, tutoring, and similar support questions, provide the best matching office from STUDENT SUPPORT SERVICES
- If both FAQ guidance and an advising/service contact are available, answer briefly first, then include the matching contact
- Prefer the selected college when choosing advisor or service contacts
- Never suggest that the bot can approve registration decisions
- If the user asks an academic advising question and no program is known, ask for the student's program before giving advisor-specific guidance
- Do not guess the student's program

- When a matching program advisor is found, explicitly include the advisor's name, email, phone, and office if available
- When a matching student support service is found, explicitly include the contact name, email, phone, and office if available
- Do not only say "contact your advisor" or "contact student services" when matching details are present
- If matching details are present, show them under a Contacts section

- If you cannot answer, provide the right escalation contact with name, email, phone
- Never make up steps or features
- Structure answers using these section headings when relevant: Step-by-Step, When to Escalate, Contacts
- Include a "Need help?" section only once if escalation is needed
- Do not repeat section headings
- Do not output raw markdown headings like # or ##
- Do not output separators like ---

${staticContext}
${faqText}
${vendorText}
${textbookText}
${programText}
${serviceText}
${contactText}`;
}


function getInternationalBoost() {
  const lines = [
    "You're on an exciting journey as an international student — and you're not alone in it.",
    "You're building something global — let’s make sure you have the right support every step of the way.",
    "Being an international student is a big step — I’m here to help you navigate it smoothly.",
    "You're doing something bold by studying internationally — let’s get you the right support."
  ];
  return lines[Math.floor(Math.random() * lines.length)];
}


async function sendMessage() {
  if (busy) return;

  if (onboardingStep !== 'done') {
    addBotMsg('<p>Please choose your role and college first so I can guide you correctly.</p>');
    return;
  }

  if (!apiKey) {
    addBotMsg('<p>Please enter your Anthropic API key to get started.</p>');
    return;
  }

  const inp = document.getElementById('userInput');
  const text = inp.value.trim();
  if (!text) return;

  const directProgram = detectProgramFromMessage(text);
  const shortProgram = maybeCaptureShortProgramReply(text);
  const detectedProgram = directProgram || shortProgram;

  const mentionedInternational = isInternationalStudentStatement(text);
  const mentionedTrio = isTrioStatement(text);

  if (mentionedInternational) {
    userFlags.internationalStudent = true;
    addUserMsg(text);
    addBotMsg(`
      <p>${buildEncouragement('international')}</p>
      <p>I’ll keep that in mind when pointing you to the right office or support contact.</p>
    `);
    inp.value = '';
    inp.style.height = 'auto';
    showChips();
    return;
  }

  if (mentionedTrio) {
    userFlags.trioStudent = true;
    addUserMsg(text);
    addBotMsg(`
      <p>${buildEncouragement('trio')}</p>
      <p>I’ll keep that in mind when routing you to support services.</p>
    `);
    inp.value = '';
    inp.style.height = 'auto';
    showChips();
    return;
  }

  if (detectedProgram && detectedProgram !== selectedProgram && text.length < 40) {
    selectedProgram = detectedProgram;
    localStorage.setItem('iccoc_program', selectedProgram);

    addUserMsg(text);
    addBotMsg(`
      <p>Nice — I’ve saved <strong>${escHtml(selectedProgram)}</strong> as your program.</p>
      <p>I’ll tailor guidance to fit your path.</p>
      <p><strong>Profile updated:</strong></p>
      <ul>
        <li>Role: ${escHtml(role)}</li>
        <li>College: ${escHtml(selectedCollege)}</li>
        <li>Program: ${escHtml(selectedProgram)}</li>
      </ul>
    `);

    inp.value = '';
    inp.style.height = 'auto';
    updateContextBar();
    showChips();
    return;
  }

  const needsProgramForAdvising =
    questionLooksLikeAdvising(text) &&
    !selectedProgram &&
    !questionLooksLikeSupportService(text);

  if (needsProgramForAdvising) {
    addUserMsg(text);
    addBotMsg(`
      <p>I can help point you to the right academic advisor.</p>
      <p>What program are you in? For example: Nursing, Business, Information Technology, or another program.</p>
    `);
    inp.value = '';
    inp.style.height = 'auto';
    hideChips();
    return;
  }

  inp.value = '';
  inp.style.height = 'auto';
  hideChips();

  addUserMsg(text);

  busy = true;
  document.getElementById('sendBtn').disabled = true;

  history.push({
    role: 'user',
    content: `[ROLE: ${role}]${selectedCollege ? `\n[COLLEGE: ${selectedCollege}]` : ''}${selectedProgram ? `\n[PROGRAM: ${selectedProgram}]` : ''}${userFlags.internationalStudent ? `\n[INTERNATIONAL_STUDENT: YES]` : ''}${userFlags.trioStudent ? `\n[TRIO_STUDENT: YES]` : ''}\n${text}`
  });

  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: buildSystemPrompt(role, text),
        messages: history
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API error');
    }

    const data = await res.json();
    let reply = data.content.map(c => c.text || '').join('');

    const lowerText = text.toLowerCase();
    const isInternationalQuery =
      lowerText.includes('international') ||
      lowerText.includes('visa') ||
      lowerText.includes('i-20') ||
      lowerText.includes('sevis') ||
      lowerText.includes('opt') ||
      lowerText.includes('cpt');

    if (isInternationalQuery || userFlags.internationalStudent) {
      reply = getInternationalBoost() + '\n\n' + reply;
    }

    history.push({ role: 'assistant', content: reply });

    removeTyping();
    addBotMsg(formatReply(reply));
    showChips();
  } catch (err) {
    removeTyping();
    addBotMsg(`<p><strong>Error:</strong> ${escHtml(err.message)}. Please check your API key and try again.</p>`);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
  updateContextBar();
}

</script>
